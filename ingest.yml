name: Ingest — Produktdaten aktualisieren

on:
  schedule:
    - cron: '0 3 * * 1'   # Jeden Montag um 03:00 UTC
  workflow_dispatch:        # Manuell auslösbar

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Dependencies installieren
        run: npm install tsx --save-dev

      - name: Ingest ausführen
        run: npx tsx ingest.ts brands.seed.json brands.json

      - name: brands.json committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brands.json
          git diff --staged --quiet || git commit -m "chore: brands.json aktualisiert ($(date -u +%Y-%m-%d))"
          git push
